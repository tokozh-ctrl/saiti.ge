<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>საზღვაო კონტეინერების კალკულატორი</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- კალკულატორის მთავარი კონტეინერი -->
    <div class="calculator-container">
        <h2>🏡 კონტეინერის კალკულატორი</h2>
        
        <div class="form-group">
            <label for="sizeSelect">შეარჩიეთ კონტეინერის ზომა:</label>
            <select id="sizeSelect">
                <option value="10">10 ფუტიანი (მცირე ოფისი / საცავი)</option>
                <option value="20">20 ფუტიანი (მცირე აგარაკი / კაფე)</option>
                <option value="40">40 ფუტიანი (საცხოვრებელი სახლი)</option>
                <option value="40hc">40 ფუტიანი High Cube (პრემიუმი)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="colorSelect">შეარჩიეთ ფერი:</label>
            <select id="colorSelect">
                <option value="anthracite">ანტრაციტი (მუქი ნაცრისფერი)</option>
                <option value="black">შავი მქრქალი</option>
                <option value="white">თეთრი კლასიკური</option>
                <option value="wood">ხისფერი ეფექტი</option>
            </select>
        </div>

        <div class="checkbox-group">
            <label><input type="checkbox" id="insulationCheck"> თბოიზოლაცია (+$500)</label>
            <label><input type="checkbox" id="windowsCheck"> კარ-ფანჯარა (+$1,200)</label>
            <label><input type="checkbox" id="foundationCheck"> საძირკველი (+$800)</label>
        </div>

        <button id="calcBtn">გამოთვლა 📊</button>
        <div id="result" style="display: none;"></div>
    </div>

    <!-- 3D ძრავი (Three.js) -->
    <script src="https://cloudflare.com"></script>
    <!-- თქვენი სკრიპტი -->
    <script src="script.js"></script>
</body>
</html>
